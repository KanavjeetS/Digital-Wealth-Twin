version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: sw_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securewealth123
      MONGO_INITDB_DATABASE: securewealth
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sw_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sw_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:securewealth123@mongodb:27017/securewealth?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      AI_SERVICE_URL: http://host.docker.internal:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-placeholder}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - sw_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sw_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_AI_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sw_network

volumes:
  mongo_data:

networks:
  sw_network:
    driver: bridge
