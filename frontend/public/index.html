<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="description" content="SecureWealth Twin — AI-Powered Digital Wealth Intelligence" />
    <title>SecureWealth Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: #0A0E1A;
        color: #E8F0FE;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1E2D45; border-radius: 4px; }
      ::selection { background: rgba(0, 212, 255, 0.25); }
      input, select, textarea, button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
